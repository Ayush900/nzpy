name: Publish Python 🐍 distribution 📦 to PyPI

on:
  release:
    types:
      - published  # Trigger when a release is published

permissions:
  id-token: write

jobs:
  build:
    name: Publish release to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          echo "Using release tag: ${{ github.event.release.tag_name }}"
          python3 -m pip install --upgrade pip
          python3 -m pip install build twine --user
          pip install setuptools wheel

      # - name: Update version in setup.py
      #   run: |
      #     sed -i "s/version=''/version='${{ github.event.release.tag_name }}'/" setup.py
          
      - name: Commit and push changes
        run: |
          # Configure Git user
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Ensure we're on the correct branch
          git branch  # List current branch to ensure we are on the right one
          git fetch origin  # Fetch the latest updates from origin
          git checkout test-release-pypi-branch  # Ensure we're on test-release-pypi-branch
          git branch  # List branches again to ensure we are on the correct one
      
          # Update the version in setup.py
          sed -i "s/version=''/version='${{ github.event.release.tag_name }}'/" setup.py
          
          # # Add and commit the changes
          git status
          git add setup.py
          git status  # Confirm the file changes
          git commit -m "Update version to ${{ github.event.release.tag_name }}"
          git status  # Confirm commit
      
          # Push the changes to the remote test-release-pypi-branch
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Ayush900/nzpy.git test-release-pypi-branch


      - name: Verify update
        run: |
          # Verify that the version is updated in setup.py
          grep 'version=' setup.py
      
      - name: Build package
        run: |
          python3 -m build
          ls dist/
      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
        name: >-
          Publish Python 🐍 distribution 📦 to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        needs:
        - build
        runs-on: ubuntu-latest
        environment:
          name: pypi
          url: https://pypi.org/p/nzpy
        permissions:
          id-token: write

        steps:
        - name: Download all the dists
          uses: actions/download-artifact@v4
          with:
            name: python-package-distributions
            path: dist/
        # - name: Publish distribution 📦 to PyPI
        #   uses: pypa/gh-action-pypi-publish@release/v1
